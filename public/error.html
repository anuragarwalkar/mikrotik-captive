<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="-1">
  <title>Error — MikroTik HotSpot</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="page-header">
    <span class="header-tag">RouterOS</span>
    <span class="status-dot warn"></span>
    <span class="header-tag">HotSpot</span>
  </header>

  <div class="card">

    <!-- Warning icon -->
    <div class="icon-ring yellow">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M12 9v4M12 17h.01" stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
              stroke="#facc15" stroke-width="2"/>
      </svg>
    </div>

    <div style="text-align:center;">
      <p class="title yellow">SYSTEM ERROR</p>
      <p class="subtitle">$(error)</p>
    </div>

    <div class="divider"></div>

    <a href="$(link-login)" class="btn btn-cyan">Return to Login</a>

  </div>

  <p class="footer-note">POWERED BY MIKROTIK ROUTEROS &middot; GOOGLE OAUTH 2.0</p>
</body>
</html>
